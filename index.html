<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BFHL — Node Hierarchy Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #000000;
    --surface: #0a0a0a;
    --surface2: #141414;
    --border: #1a1a1a;
    --accent: #7c6dfa;
    --accent2: #fa6d8e;
    --accent3: #6dfabc;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --error: #fa4d6d;
    --warning: #fabd4d;
    --mono: 'Space Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000000 !important;
    background-color: #000000 !important;
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* DSA Background Icons */
  .dsa-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.15;
    overflow: hidden;
  }

  .dsa-icon {
    position: absolute;
    color: var(--accent);
    filter: drop-shadow(0 0 5px var(--accent));
    animation: float 20s linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.15; }
    90% { opacity: 0.15; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: transparent;
    pointer-events: none;
    z-index: 0;
  }

  /* Glowing orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb1 { width: 500px; height: 500px; background: rgba(124,109,250,0.12); top: -100px; left: -100px; }
  .orb2 { width: 400px; height: 400px; background: rgba(250,109,142,0.08); bottom: -100px; right: -100px; animation-delay: -6s; }
  .orb3 { width: 300px; height: 300px; background: rgba(109,250,188,0.06); top: 50%; left: 40%; animation-delay: -3s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.1); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    margin-bottom: 3rem;
    padding-top: 2rem;
  }

  .badge {
    display: inline-block;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 0.3rem 0.8rem;
    border-radius: 2px;
    margin-bottom: 1.2rem;
    animation: fadeSlide 0.6s ease both;
  }

  h1 {
    font-family: var(--display);
    font-size: clamp(2.2rem, 6vw, 3.8rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
    animation: fadeSlide 0.6s ease 0.1s both;
  }

  h1 span.accent { color: var(--accent); }
  h1 span.accent2 { color: var(--accent2); }

  .subtitle {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.8rem;
    letter-spacing: 0.05em;
    animation: fadeSlide 0.6s ease 0.2s both;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── INPUT CARD ── */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.8rem;
    margin-bottom: 1.5rem;
    animation: fadeSlide 0.6s ease 0.3s both;
    position: relative;
    overflow: hidden;
  }

  .input-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
  }

  .input-label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .input-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.85rem;
    padding: 1rem;
    resize: vertical;
    min-height: 120px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.6;
  }

  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,109,250,0.15);
  }

  textarea::placeholder { color: var(--muted); }

  /* example chips */
  .examples-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 0.8rem;
  }

  .chip {
    font-size: 0.7rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.25rem 0.6rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,109,250,0.08);
  }

  /* ── URL INPUT ── */
  .url-row {
    display: flex;
    gap: 0.8rem;
    margin-bottom: 1.5rem;
    animation: fadeSlide 0.6s ease 0.4s both;
  }

  .url-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 0.7rem 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .url-input:focus { border-color: var(--accent); }

  /* ── BUTTONS ── */
  .btn-row {
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    animation: fadeSlide 0.6s ease 0.45s both;
  }

  .btn {
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 0.75rem 1.6rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .btn:active::after { opacity: 0.08; }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 20px rgba(124,109,250,0.35);
  }

  .btn-primary:hover {
    background: #9080ff;
    box-shadow: 0 0 30px rgba(124,109,250,0.5);
    transform: translateY(-1px);
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    border-color: var(--muted);
    color: var(--text);
  }

  .btn-danger {
    background: transparent;
    color: var(--error);
    border: 1px solid rgba(250,77,109,0.3);
  }

  .btn-danger:hover {
    background: rgba(250,77,109,0.1);
  }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 0.5rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ERROR / STATUS ── */
  .status-bar {
    padding: 0.8rem 1rem;
    border-radius: 8px;
    font-size: 0.78rem;
    margin-bottom: 1.5rem;
    display: none;
  }

  .status-bar.error {
    display: block;
    background: rgba(250,77,109,0.1);
    border: 1px solid rgba(250,77,109,0.3);
    color: var(--error);
  }

  .status-bar.success {
    display: block;
    background: rgba(109,250,188,0.08);
    border: 1px solid rgba(109,250,188,0.25);
    color: var(--accent3);
  }

  /* ── RESULTS ── */
  #results { animation: fadeSlide 0.5s ease both; }

  .section-title {
    font-family: var(--display);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 2rem 0 1rem;
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem;
    text-align: center;
    transition: border-color 0.2s, transform 0.2s;
  }

  .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .stat-value {
    font-family: var(--display);
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 0.4rem;
  }

  .stat-card:nth-child(2) .stat-value { color: var(--accent2); }
  .stat-card:nth-child(3) .stat-value { color: var(--accent3); }

  .stat-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Meta info */
  .meta-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .meta-item { display: flex; flex-direction: column; gap: 0.2rem; }
  .meta-key { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .meta-val { font-size: 0.85rem; color: var(--text); }

  /* Hierarchy cards */
  .hierarchy-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 1rem;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .hierarchy-card:hover { border-color: var(--accent); }

  .hierarchy-card.cyclic { border-color: rgba(250,77,109,0.3); }
  .hierarchy-card.cyclic:hover { border-color: var(--error); }

  .h-header {
    padding: 0.9rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    cursor: pointer;
    user-select: none;
    background: var(--surface2);
    transition: background 0.15s;
  }

  .h-header:hover { background: rgba(124,109,250,0.05); }

  .root-badge {
    font-family: var(--display);
    font-size: 1.1rem;
    font-weight: 800;
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(124,109,250,0.2);
    color: var(--accent);
    flex-shrink: 0;
  }

  .cyclic .root-badge { background: rgba(250,77,109,0.15); color: var(--error); }

  .h-meta { flex: 1; }
  .h-root-label { font-size: 0.8rem; color: var(--muted); }
  .h-root-name { font-family: var(--display); font-weight: 600; font-size: 1rem; }

  .tag {
    font-size: 0.62rem;
    padding: 0.2rem 0.55rem;
    border-radius: 4px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .tag-depth { background: rgba(124,109,250,0.15); color: var(--accent); }
  .tag-cycle { background: rgba(250,77,109,0.15); color: var(--error); }

  .chevron {
    color: var(--muted);
    font-size: 0.8rem;
    transition: transform 0.2s;
  }

  .h-header.open .chevron { transform: rotate(90deg); }

  .h-body {
    display: none;
    padding: 1.2rem;
    border-top: 1px solid var(--border);
  }

  .h-body.open { display: block; }

  /* Tree visualization */
  .tree-view { font-size: 0.82rem; line-height: 1.8; }

  .tree-node {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.1rem 0;
  }

  .tree-node .node-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .tree-node.leaf .node-dot { background: var(--accent3); }

  .tree-node .node-label {
    font-family: var(--display);
    font-weight: 600;
    font-size: 0.9rem;
  }

  .tree-indent { padding-left: 1.4rem; border-left: 1px dashed var(--border); margin-left: 0.4rem; }

  /* Tags/lists for invalid/duplicates */
  .tag-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }

  .entry-tag {
    font-size: 0.75rem;
    padding: 0.3rem 0.7rem;
    border-radius: 5px;
    font-family: var(--mono);
  }

  .entry-tag.invalid { background: rgba(250,77,109,0.12); border: 1px solid rgba(250,77,109,0.25); color: var(--error); }
  .entry-tag.duplicate { background: rgba(250,189,77,0.12); border: 1px solid rgba(250,189,77,0.25); color: var(--warning); }
  .entry-tag.none { color: var(--muted); font-size: 0.75rem; font-style: italic; }

  /* Raw JSON toggle */
  .raw-json {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    font-size: 0.75rem;
    color: var(--muted);
    overflow: auto;
    max-height: 300px;
    white-space: pre;
    display: none;
    margin-top: 1.5rem;
  }

  .raw-json.open { display: block; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .url-row { flex-direction: column; }
    .btn-row { flex-direction: column; }
    .btn { text-align: center; }
  }

  /* Pulse on submit */
  @keyframes pulseGlow {
    0%   { box-shadow: 0 0 20px rgba(124,109,250,0.35); }
    50%  { box-shadow: 0 0 40px rgba(124,109,250,0.7); }
    100% { box-shadow: 0 0 20px rgba(124,109,250,0.35); }
  }

  .btn-primary.loading { animation: pulseGlow 1s ease infinite; }
</style>
</head>
<body>

<div class="dsa-bg" id="dsaBg"></div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="container">

  <!-- HEADER -->
  <header>
    <div class="badge">SRM Full Stack Challenge — Round 1</div>
    <h1>Node <span class="accent">Hierarchy</span><br><span class="accent2">Explorer</span></h1>
    <p class="subtitle">POST /bfhl · Tree detection · Cycle analysis · Depth mapping</p>
  </header>

  <!-- API URL -->
  <div class="url-row">
    <input class="url-input" id="apiUrl" type="text" value="https://full-stack-bajaj-seven.vercel.app/bfhl" placeholder="API URL — e.g. https://your-api.onrender.com/bfhl" />
  </div>

  <!-- INPUT CARD -->
  <div class="input-card">
    <div class="input-label">Node Edge Input</div>
    <textarea id="nodeInput" placeholder='Enter edges separated by commas or newlines&#10;e.g. A->B, A->C, B->D, X->Y, Y->Z, Z->X'></textarea>
    <div class="examples-row">
      <span class="chip" onclick="loadExample('basic')">Basic Tree</span>
      <span class="chip" onclick="loadExample('cycle')">With Cycle</span>
      <span class="chip" onclick="loadExample('complex')">Complex</span>
      <span class="chip" onclick="loadExample('invalid')">Invalid Entries</span>
      <span class="chip" onclick="loadExample('full')">Full Example</span>
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="btn-row">
    <button class="btn btn-primary" id="submitBtn" onclick="submitData()">
      ▶ &nbsp;Analyze 
    </button>
    <button class="btn btn-secondary" onclick="clearAll()">✕ &nbsp;Clear</button>
    <button class="btn btn-secondary" id="rawBtn" onclick="toggleRaw()" style="display:none">{ } &nbsp;Raw JSON</button>
    <button class="btn btn-danger" id="copyBtn" onclick="copyJSON()" style="display:none">⎘ &nbsp;Copy JSON</button>
  </div>

  <!-- STATUS -->
  <div class="status-bar" id="statusBar"></div>

  <!-- RESULTS -->
  <div id="results"></div>

  <!-- RAW JSON -->
  <pre class="raw-json" id="rawJson"></pre>

</div>

<script>
const EXAMPLES = {
  basic: 'A->B, A->C, B->D',
  cycle: 'X->Y, Y->Z, Z->X',
  complex: 'A->B, A->C, B->D, C->E, P->Q, Q->R',
  invalid: 'A->B, hello, 1->2, A->, A->A, AB->C',
  full: 'A->B, A->C, B->D, C->E, E->F, X->Y, Y->Z, Z->X, P->Q, Q->R, G->H, G->H, G->I, hello, 1->2, A->'
};

let lastResponse = null;
let rawVisible = false;

function loadExample(key) {
  document.getElementById('nodeInput').value = EXAMPLES[key];
}

function clearAll() {
  document.getElementById('nodeInput').value = '';
  document.getElementById('results').innerHTML = '';
  document.getElementById('rawJson').textContent = '';
  document.getElementById('rawJson').classList.remove('open');
  document.getElementById('rawBtn').style.display = 'none';
  document.getElementById('copyBtn').style.display = 'none';
  setStatus('', '');
  lastResponse = null;
  rawVisible = false;
}

function setStatus(msg, type) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar' + (type ? ' ' + type : '');
}

function toggleRaw() {
  rawVisible = !rawVisible;
  document.getElementById('rawJson').classList.toggle('open', rawVisible);
  document.getElementById('rawBtn').textContent = rawVisible ? '{ } Hide JSON' : '{ } Raw JSON';
}

function copyJSON() {
  if (!lastResponse) return;
  navigator.clipboard.writeText(JSON.stringify(lastResponse, null, 2))
    .then(() => setStatus('✓ JSON copied to clipboard', 'success'))
    .catch(() => setStatus('Could not copy — try manually', 'error'));
}

async function submitData() {
  const raw = document.getElementById('nodeInput').value.trim();
  if (!raw) { setStatus('⚠ Please enter some node edges first.', 'error'); return; }

  const apiUrl = document.getElementById('apiUrl').value.trim();
  if (!apiUrl) { setStatus('⚠ Enter the API URL above.', 'error'); return; }

  // Parse input — split by comma or newline
  const data = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.innerHTML = '<span class="spinner"></span>Analyzing...';
  setStatus('', '');

  try {
    const res = await fetch(apiUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const json = await res.json();
    lastResponse = json;

    renderResults(json);
    document.getElementById('rawJson').textContent = JSON.stringify(json, null, 2);
    document.getElementById('rawBtn').style.display = 'inline-block';
    document.getElementById('copyBtn').style.display = 'inline-block';
    setStatus(`✓ Analysis complete — ${json.hierarchies.length} group(s) found`, 'success');

  } catch (err) {
    setStatus('✗ API Error: ' + err.message, 'error');
    document.getElementById('results').innerHTML = '';
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.innerHTML = '▶ &nbsp;Analyze Nodes';
  }
}

function renderResults(json) {
  const el = document.getElementById('results');

  // META
  let html = `
    <div class="section-title">Identity</div>
    <div class="meta-card">
      <div class="meta-item"><span class="meta-key">User ID</span><span class="meta-val">${json.user_id}</span></div>
      <div class="meta-item"><span class="meta-key">Email</span><span class="meta-val">${json.email_id}</span></div>
      <div class="meta-item"><span class="meta-key">Roll No.</span><span class="meta-val">${json.college_roll_number}</span></div>
    </div>

    <div class="section-title">Summary</div>
    <div class="summary-grid">
      <div class="stat-card">
        <div class="stat-value">${json.summary.total_trees}</div>
        <div class="stat-label">Valid Trees</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${json.summary.total_cycles}</div>
        <div class="stat-label">Cycles Detected</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${json.summary.largest_tree_root || '—'}</div>
        <div class="stat-label">Deepest Root</div>
      </div>
    </div>

    <div class="section-title">Hierarchies (${json.hierarchies.length})</div>
  `;

  // HIERARCHIES
  for (let i = 0; i < json.hierarchies.length; i++) {
    const h = json.hierarchies[i];
    const isCyclic = !!h.has_cycle;

    html += `
      <div class="hierarchy-card ${isCyclic ? 'cyclic' : ''}">
        <div class="h-header" onclick="toggleHCard(this)">
          <div class="root-badge">${h.root}</div>
          <div class="h-meta">
            <div class="h-root-label">Root Node</div>
            <div class="h-root-name">${h.root}</div>
          </div>
          ${isCyclic
            ? `<span class="tag tag-cycle">⟳ Cycle</span>`
            : `<span class="tag tag-depth">Depth ${h.depth}</span>`}
          <span class="chevron">›</span>
        </div>
        <div class="h-body">
          ${isCyclic
            ? `<div style="color:var(--error);font-size:0.8rem;">⚠ Cyclic group — no valid tree structure. All nodes in this group form a cycle.</div>`
            : renderTreeHTML(h.root, h.tree[h.root] || {})
          }
        </div>
      </div>
    `;
  }

  // INVALID ENTRIES
  html += `<div class="section-title">Invalid Entries (${json.invalid_entries.length})</div>`;
  if (json.invalid_entries.length === 0) {
    html += `<div class="tag-list"><span class="entry-tag none">None — all entries were valid</span></div>`;
  } else {
    html += `<div class="tag-list">`;
    for (const e of json.invalid_entries) {
      html += `<span class="entry-tag invalid">${escHtml(String(e))}</span>`;
    }
    html += `</div>`;
  }

  // DUPLICATE EDGES
  html += `<div class="section-title">Duplicate Edges (${json.duplicate_edges.length})</div>`;
  if (json.duplicate_edges.length === 0) {
    html += `<div class="tag-list"><span class="entry-tag none">None — no duplicate edges</span></div>`;
  } else {
    html += `<div class="tag-list">`;
    for (const e of json.duplicate_edges) {
      html += `<span class="entry-tag duplicate">${escHtml(e)}</span>`;
    }
    html += `</div>`;
  }

  el.innerHTML = html;
}

function renderTreeHTML(nodeName, children, depth = 0) {
  const isLeaf = Object.keys(children).length === 0;
  let html = `
    <div class="tree-node ${isLeaf ? 'leaf' : ''}" style="padding-left:${depth * 20}px">
      <div class="node-dot"></div>
      <div class="node-label">${nodeName}</div>
    </div>
  `;
  if (!isLeaf) {
    html += `<div class="tree-indent" style="margin-left:${depth * 20 + 4}px">`;
    for (const [child, grandchildren] of Object.entries(children)) {
      html += renderTreeHTML(child, grandchildren, 0);
    }
    html += `</div>`;
  }
  return `<div class="tree-view">${html}</div>`;
}

function toggleHCard(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Auto-open first hierarchy card after render
const _orig = document.getElementById;
document.addEventListener('DOMContentLoaded', () => {});
</script>
